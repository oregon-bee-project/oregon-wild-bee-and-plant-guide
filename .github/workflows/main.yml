# Name of your workflow
name: React and Python CI & Full-Stack Deploy

# 1. When to run the workflow
on:
  push:
    branches: [main]
  # Trigger on pull requests to 'main'
  pull_request:
    branches: [main]
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:

# Grant permissions for the deploy job
permissions:
  contents: read
  pages: write # Required for GitHub Pages deploy
  id-token: write # Required for auth
  pull-requests: write # Required for posting the preview URL comment

# 2. What jobs to run
jobs:
  # The "CI" part: build and test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # --- React/Frontend Steps ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm install # Using 'install' to bypass lockfile errors
        working-directory: ./src/frontend

      - name: Run tests
        run: npm test
        working-directory: ./src/frontend

      - name: Build the app
        run: npm run build
        working-directory: ./src/frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src/frontend/dist # Use 'dist' for Vite

      # --- Python/Backend Steps ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: (Backend) Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./src/backend

      # (Skipping Python tests as requested)
      # - name: (Backend) Run tests (Pytest)
      #   run: pytest
      #   working-directory: ./src/backend/model

  # 3. The "CD" part: deploy to GitHub Pages
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    needs: build

    # Run on a push to main (production) OR on any pull request (preview)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'

    environment:
      name: github
