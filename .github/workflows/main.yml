# Name of your workflow
name: React and Python CI/CD

# 1. When to run the workflow
on:
  # Run on pushes to the 'main' branch
  push:
    branches: [main]
  # Run on pull requests targeting the 'main' branch
  pull_request:
    branches: [main]

# 2. What jobs to run
jobs:
  # The "CI" part: build and test
  build-and-test:
    name: Build & Test
    # Use the latest Ubuntu (a flavor of Linux)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Check out code
        uses: actions/checkout@v4

      # --- React/Frontend Steps ---
      - name: Set up Node.js (for React)
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Use a Node.js version you use

      - name: (Frontend) Install dependencies
        # Assumes your React app is in a 'frontend' folder
        run: npm install
        working-directory: ./frontend

      - name: (Frontend) Run tests
        run: npm test
        working-directory: src/frontend

      - name: (Frontend) Build the app
        # This builds the static files for production
        run: npm run build
        working-directory: src/frontend

      # --- Python/Backend Steps ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Use a Python version you use

      - name: (Backend) Install dependencies
        # Assumes your Python app is in a 'backend' folder
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: src/backend

      - name: (Backend) Run tests
        # This assumes you use 'pytest'
        run: pytest
        working-directory: src/backend

