# Name of your workflow
name: React and Python CI & Full-Stack Deploy

# 1. When to run the workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Grant permissions
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

# 2. What jobs to run
jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # --- React/Frontend Steps ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # This path is correct:
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        # All npm commands run from here:
        working-directory: ./src/frontend

      - name: Run tests
        run: npm test
        working-directory: ./src/frontend

      - name: Build the app
        run: npm run build
        working-directory: ./src/frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The 'dist' folder is created inside 'src/frontend'
          path: ./src/frontend/dist

      # --- Python/Backend Steps ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: (Backend) Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # 3. The "CD" part: deploy to GitHub Pages
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    needs: build
    # deployment safeguard: only deploy on push to main or on PRs
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 4. The "CD" part: deploy to Render
  deploy-backend:
    name: Deploy Backend to Render
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
